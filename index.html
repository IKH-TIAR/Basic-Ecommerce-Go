<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fresh Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf7f2;
      --card: #ffffff;
      --ink: #1a1208;
      --muted: #8a7d6b;
      --accent: #e8622a;
      --accent2: #4a9e6b;
      --border: #ede8df;
      --shadow: 0 4px 24px rgba(26,18,8,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      padding: 48px 5vw 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    .subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-bottom: 6px;
    }

    main {
      padding: 48px 5vw;
    }

    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .count {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .count strong { color: var(--ink); font-weight: 500; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(20px);
      animation: rise 0.5s forwards;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(232,98,42,0.12);
      transition: all 0.25s ease;
    }

    .card-img {
      height: 160px;
      background: linear-gradient(135deg, #fdebd0 0%, #fdf3e7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      position: relative;
    }

    .card-id {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--ink);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      border-radius: 20px;
    }

    .card-body {
      padding: 20px 20px 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }

    .price {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--accent2);
      font-family: 'Playfair Display', serif;
    }

    .price sup { font-size: 0.65em; vertical-align: super; }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover { background: #c9521f; transform: scale(1.04); }
    .btn:active { transform: scale(0.97); }

    /* States */
    .state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .state .icon { font-size: 3rem; margin-bottom: 16px; }
    .state h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--ink); margin-bottom: 8px; }
    .state p { font-size: 0.9rem; }

    .retry-btn {
      margin-top: 20px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover { background: #3a2a10; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* Add Product Button in Header */
    .add-btn {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .add-btn:hover { background: #3a2a10; transform: scale(1.03); }
    .add-btn:active { transform: scale(0.97); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,18,8,0.45);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 20px;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 24px 80px rgba(26,18,8,0.2);
      position: relative;
      transform: translateY(24px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--border);
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .modal-close:hover { background: var(--ink); color: #fff; }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .form-group input,
    .form-group textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      outline: none;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,98,42,0.12);
    }

    .form-error {
      background: #fff0eb;
      border: 1px solid #f5c4af;
      border-radius: 8px;
      color: #c9521f;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover { background: #c9521f; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #d4bfb2; cursor: not-allowed; transform: none; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: #fff;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { background: var(--accent2); }
    .toast.error { background: #c9521f; }
  </style>
</head>
<body>

<header>
  <div>
    <p class="subtitle">Fresh & Local</p>
    <h1>The <span>Market</span></h1>
  </div>
  <button class="add-btn" onclick="openModal()">＋ Add Product</button>
</header>

<!-- Modal Overlay -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modal-title" class="modal-title">New Product</h2>
    <p class="modal-subtitle">Fill in the details below to add to the market.</p>

    <div class="form-group">
      <label for="f-title">Title</label>
      <input id="f-title" type="text" placeholder="e.g. Fresh Mango" autocomplete="off"/>
    </div>
    <div class="form-group">
      <label for="f-desc">Description</label>
      <textarea id="f-desc" rows="3" placeholder="Describe the product…"></textarea>
    </div>
    <div class="form-group">
      <label for="f-price">Price ($)</label>
      <input id="f-price" type="number" min="0" step="0.01" placeholder="0.00"/>
    </div>

    <div id="form-error" class="form-error" style="display:none"></div>

    <button class="submit-btn" id="submit-btn" onclick="submitProduct()">Add Product</button>
  </div>
</div>

<main>
  <div class="meta-bar">
    <p class="count" id="count"></p>
  </div>
  <div id="app"></div>
</main>

<footer>Fresh Market — powered by localhost:9090</footer>

<div id="toast" class="toast"></div>

<script>
  const API = 'http://localhost:9090/products';
  const CREATE_API = 'http://localhost:9090/create';
  const app = document.getElementById('app');
  const countEl = document.getElementById('count');
  const overlay = document.getElementById('modal-overlay');

  // ── Modal ──────────────────────────────────────────
  function openModal() {
    overlay.classList.add('open');
    document.getElementById('f-title').focus();
    document.getElementById('form-error').style.display = 'none';
  }

  function closeModal(e) {
    if (e && e.target !== overlay) return;
    overlay.classList.remove('open');
    clearForm();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') overlay.classList.remove('open');
  });

  function clearForm() {
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-price').value = '';
    document.getElementById('form-error').style.display = 'none';
  }

  // ── Toast ──────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── Submit ─────────────────────────────────────────
  async function submitProduct() {
    const title = document.getElementById('f-title').value.trim();
    const description = document.getElementById('f-desc').value.trim();
    const price = parseFloat(document.getElementById('f-price').value);
    const errEl = document.getElementById('form-error');
    const btn = document.getElementById('submit-btn');

    if (!title || !description || isNaN(price) || price < 0) {
      errEl.textContent = 'Please fill in all fields with valid values.';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;margin:0;border-width:2px"></div> Adding…';

    try {
      const res = await fetch(CREATE_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description, price })
      });

      if (!res.ok) throw new Error(`Server responded with ${res.status} ${res.statusText}`);

      overlay.classList.remove('open');
      clearForm();
      showToast('✓ Product added successfully!', 'success');
      fetchProducts();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      showToast('Failed to add product.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Add Product';
    }
  }

  const EMOJIS = {
    mango: '🥭', orange: '🍊', banana: '🍌', apple: '🍎',
    grape: '🍇', watermelon: '🍉', strawberry: '🍓', default: '🛒'
  };

  function getEmoji(title = '') {
    const key = title.trim().toLowerCase();
    for (const [word, emoji] of Object.entries(EMOJIS)) {
      if (key.includes(word)) return emoji;
    }
    return EMOJIS.default;
  }

  function formatPrice(price) {
    const [int, dec] = Number(price).toFixed(2).split('.');
    return { int, dec };
  }

  function renderProducts(products) {
    countEl.innerHTML = `Showing <strong>${products.length}</strong> product${products.length !== 1 ? 's' : ''}`;

    if (!products.length) {
      app.innerHTML = `
        <div class="state">
          <div class="icon">🫙</div>
          <h2>Nothing here yet</h2>
          <p>No products were found in the response.</p>
        </div>`;
      return;
    }

    app.innerHTML = `<div class="grid">${products.map(p => {
      const { int, dec } = formatPrice(p.price);
      return `
        <div class="card">
          <div class="card-img">
            ${getEmoji(p.title)}
            <span class="card-id">#${p.id}</span>
          </div>
          <div class="card-body">
            <h2 class="card-title">${escapeHtml(p.title)}</h2>
            <p class="card-desc">${escapeHtml(p.description)}</p>
            <div class="card-footer">
              <span class="price"><sup>$</sup>${int}<sup>.${dec}</sup></span>
              <button class="btn">Add to Cart</button>
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  function renderLoading() {
    app.innerHTML = `
      <div class="state">
        <div class="spinner"></div>
        <p>Fetching products…</p>
      </div>`;
    countEl.textContent = '';
  }

  function renderError(msg) {
    app.innerHTML = `
      <div class="state">
        <div class="icon">⚠️</div>
        <h2>Couldn't load products</h2>
        <p>${escapeHtml(msg)}</p>
        <button class="retry-btn" onclick="fetchProducts()">Try again</button>
      </div>`;
    countEl.textContent = '';
  }

  function escapeHtml(str = '') {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function fetchProducts() {
    renderLoading();
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`Server responded with ${res.status} ${res.statusText}`);
      const data = await res.json();
      renderProducts(Array.isArray(data) ? data : [data]);
    } catch (err) {
      renderError(err.message);
    }
  }

  fetchProducts();
</script>
</body>
</html>
