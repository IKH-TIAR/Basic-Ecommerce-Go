<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Market</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f2e8;
      --paper: #fffaf3;
      --card: #ffffff;
      --ink: #24180e;
      --muted: #7a6d60;
      --accent: #db5e27;
      --accent2: #2f8a5d;
      --danger: #b63f2c;
      --line: #eadfce;
      --shadow: 0 12px 40px rgba(36,24,14,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 90% -10%, #ffe2b8 0%, rgba(255,226,184,0) 38%),
        radial-gradient(circle at 4% 24%, #f7d4ca 0%, rgba(247,212,202,0) 35%),
        var(--bg);
    }

    header {
      padding: 32px 5vw 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,250,243,0.75) 0%, rgba(255,250,243,0.45) 100%);
      backdrop-filter: blur(2px);
    }

    .hero p {
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.1rem, 5vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.025em;
    }

    .hero h1 span { color: var(--accent); }

    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .btn, .btn-link {
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      padding: 10px 16px;
    }

    .btn:active, .btn-link:active { transform: scale(0.98); }
    .btn.main { background: var(--ink); color: #fff; }
    .btn.main:hover { background: #3b2a1d; }
    .btn.flat { background: #f1e8dc; color: var(--ink); }
    .btn.flat:hover { background: #e8dbc9; }
    .btn.warn { background: var(--danger); color: #fff; }
    .btn.warn:hover { background: #8f2f21; }
    .btn-link { background: #f1e8dc; color: var(--ink); }
    .btn-link:hover { background: #e8dbc9; }

    main { padding: 34px 5vw 50px; }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .count {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .count strong { color: var(--ink); }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
      background: rgba(255, 250, 243, 0.8);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: rise 0.35s ease forwards;
      opacity: 0;
      transform: translateY(18px);
    }

    .card:nth-child(2n) { animation-delay: 0.04s; }
    .card:nth-child(3n) { animation-delay: 0.08s; }
    .card:nth-child(5n) { animation-delay: 0.12s; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      height: 142px;
      position: relative;
      display: grid;
      place-items: center;
      font-size: 3.5rem;
      background: linear-gradient(145deg, #fff2dd 0%, #ffe8cd 100%);
      border-bottom: 1px solid var(--line);
    }

    .badge {
      position: absolute;
      right: 10px;
      top: 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      background: var(--ink);
      color: #fff;
      padding: 4px 9px;
      letter-spacing: 0.05em;
    }

    .body {
      padding: 16px 16px 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 8px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.22rem;
      text-transform: capitalize;
    }

    .desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
      min-height: 54px;
    }

    .row {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .price {
      color: var(--accent2);
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .small {
      border: none;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.14s ease, background 0.2s ease;
    }

    .small:active { transform: scale(0.97); }
    .small.edit { background: #f1e8dc; color: var(--ink); }
    .small.edit:hover { background: #e6dac5; }
    .small.del { background: #fbe0dc; color: #932d1f; }
    .small.del:hover { background: #f5c5bc; }

    .state {
      text-align: center;
      padding: 84px 18px;
      color: var(--muted);
    }

    .state .icon { font-size: 2.4rem; margin-bottom: 10px; }
    .state h2 {
      font-family: 'Playfair Display', serif;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .retry {
      margin-top: 14px;
      border: none;
      background: var(--ink);
      color: #fff;
      border-radius: 8px;
      padding: 10px 15px;
      cursor: pointer;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid #e8ddcb;
      border-top-color: var(--accent);
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }

    .mini-spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(21, 13, 6, 0.48);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease;
      padding: 18px;
      z-index: 100;
    }

    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      width: min(480px, 100%);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 84px rgba(21, 13, 6, 0.26);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.24s cubic-bezier(0.33,1.3,0.66,1);
      position: relative;
      padding: 26px;
    }

    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .close {
      border: none;
      position: absolute;
      right: 10px;
      top: 10px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f1e8dc;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .close:hover { background: #e6dac5; color: var(--ink); }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      margin-bottom: 4px;
    }

    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .field input,
    .field textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      font-size: 0.96rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(219, 94, 39, 0.13);
    }

    .error {
      display: none;
      background: #feece8;
      color: #9b2f20;
      border: 1px solid #f4c2b8;
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .submit {
      border: none;
      background: var(--accent);
      color: #fff;
      width: 100%;
      border-radius: 10px;
      font-size: 0.94rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      padding: 12px;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit:hover { background: #b84d1f; }
    .submit:disabled { cursor: not-allowed; background: #c7b2a1; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translate(-50%, 18px);
      background: var(--ink);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 130;
      font-size: 0.85rem;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.success { background: var(--accent2); }
    .toast.error { background: var(--danger); }

    footer {
      border-top: 1px solid var(--line);
      padding: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    @media (max-width: 700px) {
      .toolbar { width: 100%; }
      .btn, .btn-link { flex: 1; }
      .pill { width: 100%; text-align: center; }
      .hint { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <p>Fresh and Local</p>
      <h1>The <span>Market</span></h1>
    </div>

    <div class="toolbar">
      <span class="pill" id="auth-status">Token: not signed in</span>
      <a class="btn-link" href="signup.html">Signup</a>
      <a class="btn-link" href="login.html">Login</a>
      <button class="btn flat" onclick="logout()">Logout</button>
      <button class="btn main" onclick="openCreateModal()">+ Add Product</button>
    </div>
  </header>

  <main>
    <div class="meta">
      <p class="count" id="count"></p>
      <p class="hint">Create, update, and delete product APIs need a JWT token from login.</p>
    </div>
    <div id="app"></div>
  </main>

  <footer>Fresh Market API Dashboard - localhost:9090</footer>

  <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="close" onclick="closeModal()">&times;</button>
      <h2 id="modal-title">New Product</h2>
      <p id="modal-subtitle" class="sub">Create a product entry for your catalog.</p>

      <div class="field">
        <label for="f-title">Title</label>
        <input id="f-title" type="text" placeholder="Fresh Mango" autocomplete="off" />
      </div>

      <div class="field">
        <label for="f-desc">Description</label>
        <textarea id="f-desc" rows="3" placeholder="Describe this product"></textarea>
      </div>

      <div class="field">
        <label for="f-price">Price ($)</label>
        <input id="f-price" type="number" min="0" step="0.01" placeholder="0.00" />
      </div>

      <div id="form-error" class="error"></div>
      <button id="submit-btn" class="submit" onclick="submitProduct()">Add Product</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = 'http://localhost:9090';
    const PRODUCTS_API = `${API_BASE}/products`;
    const TOKEN_KEY = 'access_token';

    const app = document.getElementById('app');
    const countEl = document.getElementById('count');
    const overlay = document.getElementById('modal-overlay');
    const authStatus = document.getElementById('auth-status');

    let editingId = null;

    const EMOJIS = {
      mango: '🥭', orange: '🍊', banana: '🍌', apple: '🍎',
      grape: '🍇', watermelon: '🍉', strawberry: '🍓', default: '🛒'
    };

    function token() {
      return localStorage.getItem(TOKEN_KEY) || '';
    }

    function updateAuthBadge() {
      authStatus.textContent = token() ? 'Token: signed in' : 'Token: not signed in';
    }

    function authHeaders() {
      const tkn = token();
      return tkn
        ? { 'Content-Type': 'application/json', Authorization: `Bearer ${tkn}` }
        : { 'Content-Type': 'application/json' };
    }

    function ensureToken() {
      if (token()) return true;
      showToast('Please login first to call protected APIs.', 'error');
      return false;
    }

    function showToast(message, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.className = `toast ${type} show`;
      setTimeout(() => el.classList.remove('show'), 2600);
    }

    function escapeHtml(value = '') {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatPrice(price) {
      const [int, dec] = Number(price).toFixed(2).split('.');
      return { int, dec };
    }

    function getEmoji(title = '') {
      const key = title.trim().toLowerCase();
      for (const [word, emoji] of Object.entries(EMOJIS)) {
        if (key.includes(word)) return emoji;
      }
      return EMOJIS.default;
    }

    function renderLoading() {
      countEl.textContent = '';
      app.innerHTML = `
        <div class="state">
          <div class="spinner"></div>
          <p>Fetching products...</p>
        </div>`;
    }

    function renderError(message) {
      countEl.textContent = '';
      app.innerHTML = `
        <div class="state">
          <div class="icon">⚠️</div>
          <h2>Could not load products</h2>
          <p>${escapeHtml(message)}</p>
          <button class="retry" onclick="fetchProducts()">Try again</button>
        </div>`;
    }

    function renderProducts(products) {
      const hasToken = Boolean(token());

      countEl.innerHTML = `Showing <strong>${products.length}</strong> product${products.length !== 1 ? 's' : ''}`;

      if (!products.length) {
        app.innerHTML = `
          <div class="state">
            <div class="icon">🫙</div>
            <h2>No products yet</h2>
            <p>Add your first product using the button above.</p>
          </div>`;
        return;
      }

      app.innerHTML = `<div class="grid">${products.map((p) => {
        const safeTitle = escapeHtml(p.title);
        const safeDesc = escapeHtml(p.description);
        const { int, dec } = formatPrice(p.price);

        return `
          <article class="card">
            <div class="card-top">
              ${getEmoji(p.title)}
              <span class="badge">#${p.id}</span>
            </div>
            <div class="body">
              <h2 class="title">${safeTitle}</h2>
              <p class="desc">${safeDesc}</p>
              <div class="row">
                <span class="price">$${int}.${dec}</span>
                <div class="actions">
                  <button class="small edit" onclick="openEditModal(${p.id}, ${JSON.stringify(p.title)}, ${JSON.stringify(p.description)}, ${Number(p.price)})" ${hasToken ? '' : 'disabled'}>Edit</button>
                  <button class="small del" onclick="deleteProduct(${p.id})" ${hasToken ? '' : 'disabled'}>Delete</button>
                </div>
              </div>
            </div>
          </article>`;
      }).join('')}</div>`;
    }

    async function fetchProducts() {
      renderLoading();
      try {
        const res = await fetch(PRODUCTS_API);
        if (!res.ok) throw new Error(`Server responded with ${res.status} ${res.statusText}`);
        const data = await res.json();
        renderProducts(Array.isArray(data) ? data : [data]);
      } catch (error) {
        renderError(error.message || 'Unknown error');
      }
    }

    function clearForm() {
      document.getElementById('f-title').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-price').value = '';
      document.getElementById('form-error').style.display = 'none';
    }

    function openCreateModal() {
      if (!ensureToken()) return;

      editingId = null;
      document.getElementById('modal-title').textContent = 'New Product';
      document.getElementById('modal-subtitle').textContent = 'Create a product entry for your catalog.';
      document.getElementById('submit-btn').textContent = 'Add Product';
      clearForm();

      overlay.classList.add('open');
      document.getElementById('f-title').focus();
    }

    function openEditModal(id, title, description, price) {
      if (!ensureToken()) return;

      editingId = id;
      document.getElementById('modal-title').textContent = `Edit Product #${id}`;
      document.getElementById('modal-subtitle').textContent = 'Update the details and save your changes.';
      document.getElementById('submit-btn').textContent = 'Update Product';

      document.getElementById('f-title').value = title;
      document.getElementById('f-desc').value = description;
      document.getElementById('f-price').value = Number(price).toFixed(2);
      document.getElementById('form-error').style.display = 'none';

      overlay.classList.add('open');
      document.getElementById('f-title').focus();
    }

    function closeModal(event) {
      if (event && event.target !== overlay) return;
      overlay.classList.remove('open');
      clearForm();
      editingId = null;
    }

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
    });

    async function submitProduct() {
      if (!ensureToken()) return;

      const title = document.getElementById('f-title').value.trim();
      const description = document.getElementById('f-desc').value.trim();
      const price = Number.parseFloat(document.getElementById('f-price').value);

      const errorEl = document.getElementById('form-error');
      const submitBtn = document.getElementById('submit-btn');

      if (!title || !description || Number.isNaN(price) || price < 0) {
        errorEl.textContent = 'Please provide valid title, description, and price.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      const prevHtml = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="mini-spinner"></span> Saving...';

      const method = editingId ? 'PUT' : 'POST';
      const url = editingId ? `${PRODUCTS_API}/${editingId}` : PRODUCTS_API;

      try {
        const res = await fetch(url, {
          method,
          headers: authHeaders(),
          body: JSON.stringify({ title, description, price })
        });

        if (!res.ok) throw new Error(`Server responded with ${res.status} ${res.statusText}`);

        closeModal();
        showToast(editingId ? 'Product updated successfully.' : 'Product added successfully.');
        await fetchProducts();
      } catch (error) {
        errorEl.textContent = error.message || 'Request failed';
        errorEl.style.display = 'block';
        showToast('Could not save product.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = prevHtml;
      }
    }

    async function deleteProduct(id) {
      if (!ensureToken()) return;

      const confirmed = window.confirm(`Delete product #${id}?`);
      if (!confirmed) return;

      try {
        const res = await fetch(`${PRODUCTS_API}/${id}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
        if (!res.ok) throw new Error(`Server responded with ${res.status} ${res.statusText}`);

        showToast('Product deleted.');
        await fetchProducts();
      } catch (error) {
        showToast(error.message || 'Delete failed.', 'error');
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      updateAuthBadge();
      showToast('Logged out from local session.');
      fetchProducts();
    }

    updateAuthBadge();
    fetchProducts();
  </script>
</body>
</html>
